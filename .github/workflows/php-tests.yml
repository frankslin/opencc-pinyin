name: PHP Tests

on:
  push:
    paths:
      - 'php/**'
      - 'dist/php/**'
      - 'composer.json'
      - 'phpunit.xml.dist'
      - '.github/workflows/php-tests.yml'
  pull_request:
    paths:
      - 'php/**'
      - 'dist/php/**'
      - 'composer.json'
      - 'phpunit.xml.dist'
      - '.github/workflows/php-tests.yml'

jobs:
  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: Run PHPUnit
        run: composer test

      - name: Run full dataset round-trip
        run: composer test:data
